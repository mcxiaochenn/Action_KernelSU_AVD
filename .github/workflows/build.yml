name: Build KernelSU for AVD x86_64

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: '内核分支 (从 BUILD_INFO 的 repo-init-branch 获取)'
        required: true
        default: 'aosp_kernel-common-android16-6.12'
        type: string
      build_number:
        description: 'CI 构建号 (从 uname -r 的 -ab 后面获取)'
        required: true
        default: '15053784'
        type: string
      ksu_version:
        description: 'KernelSU 版本'
        required: true
        default: 'v3.2.5'
        type: string
      use_cache:
        description: '使用构建缓存 (加速构建，但可能使用旧的源码/编译产物)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libelf-dev libssl-dev \
            liblz4-tool cpio lz4 repo
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Bazelisk
        run: |
          wget -q https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64 \
            -O /tmp/bazel
          sudo mv /tmp/bazel /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Cache repo sync
        if: ${{ inputs.use_cache }}
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-sync-${{ inputs.build_number }}-${{ inputs.kernel_branch }}
          restore-keys: |
            repo-sync-${{ inputs.build_number }}-
            repo-sync-

      - name: Sync kernel source via manifest
        run: |
          BID=${{ inputs.build_number }}
          CI_TARGET="kernel_virt_x86_64"

          echo "Fetching manifest for build $BID ($CI_TARGET)..."
          mkdir -p kernel
          cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest --depth=1
          curl -Lo ".repo/manifests/manifest_${BID}.xml" \
            "https://ci.android.com/builds/submitted/${BID}/${CI_TARGET}/latest/raw/manifest_${BID}.xml"
          repo init -m "manifest_${BID}.xml"
          repo sync -c -j"$(nproc --all)" --no-tags --fail-fast

          echo "repo sync complete"
          ls -la common/Makefile

      - name: Cache Bazel build
        if: ${{ inputs.use_cache }}
        uses: actions/cache@v4
        with:
          path: |
            kernel/out/cache
            kernel/out/.cache
          key: bazel-${{ inputs.build_number }}-${{ hashFiles('kernel/common/Makefile') }}
          restore-keys: |
            bazel-${{ inputs.build_number }}-
            bazel-

      - name: Detect kernel version
        id: metadata
        run: |
          cd kernel
          VERSION=$(grep '^VERSION = ' common/Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' common/Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' common/Makefile | awk '{print $3}')
          KERNEL_VERSION="$VERSION.$PATCHLEVEL"
          echo "Detected kernel: $KERNEL_VERSION.$SUBLEVEL"
          echo "kernel_version=$KERNEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "sublevel=$SUBLEVEL" >> "$GITHUB_OUTPUT"

      - name: Apply x86_64 syscall hardening patches
        run: |
          cd kernel/common
          KERNEL_VERSION="${{ steps.metadata.outputs.kernel_version }}"

          echo "Applying x86_64 syscall hardening patches for kernel $KERNEL_VERSION..."

          case "$KERNEL_VERSION" in
            6.12)
              # Android 16 kernel 6.12: 手动添加 X86_FEATURE_INDIRECT_SAFE
              if ! grep -q 'X86_FEATURE_INDIRECT_SAFE' arch/x86/include/asm/cpufeatures.h; then
                sed -i '/X86_FEATURE_INDIRECT_THUNK_ITS/a #define X86_FEATURE_INDIRECT_SAFE\t(21*32 + 7) /* "" Indirect branches can be used for syscalls */' arch/x86/include/asm/cpufeatures.h
                echo "Added X86_FEATURE_INDIRECT_SAFE to cpufeatures.h"
              fi

              if ! grep -q 'cpu_show_syscall_hardening' include/linux/cpu.h; then
                sed -i '/extern ssize_t cpu_show_tsa/i #if defined(CONFIG_X86) || defined(CONFIG_X86_64)\nextern ssize_t cpu_show_syscall_hardening(struct device *dev,\n\t\t\t\t\t       struct device_attribute *attr, char *buf);\n#endif\n' include/linux/cpu.h
                echo "Added cpu_show_syscall_hardening to cpu.h"
              fi

              # 应用 syscall hardening 补丁
              curl -L "https://github.com/android-generic/kernel-zenith/commit/dd2c602268fdc81f4d3b662f6a15142ac0ec7bcd.patch" -o /tmp/ksu-patch1.patch
              git apply --check --whitespace=fix \
                --exclude=arch/x86/include/asm/cpufeatures.h \
                --exclude=arch/x86/kernel/cpu/bugs.c \
                /tmp/ksu-patch1.patch
              git apply --whitespace=fix \
                --exclude=arch/x86/include/asm/cpufeatures.h \
                --exclude=arch/x86/kernel/cpu/bugs.c \
                /tmp/ksu-patch1.patch
              echo "Applied patch 1"

              curl -L "https://github.com/android-generic/kernel-zenith/commit/7d99237ae5da61c19447138da3282ae37d43857b.patch" -o /tmp/ksu-patch2.patch
              git apply --check --whitespace=fix \
                --exclude=arch/x86/kernel/cpu/bugs.c \
                --exclude=include/linux/cpu.h \
                /tmp/ksu-patch2.patch
              git apply --whitespace=fix \
                --exclude=arch/x86/kernel/cpu/bugs.c \
                --exclude=include/linux/cpu.h \
                /tmp/ksu-patch2.patch
              echo "Applied patch 2"

              # 默认关闭 syscall_hardening（AVD 没有稳定的 -append 选项）
              if grep -q 'syscall_hardening __ro_after_init = SYSCALL_HARDENING_ON;' arch/x86/kernel/cpu/common.c; then
                sed -i 's/syscall_hardening __ro_after_init = SYSCALL_HARDENING_ON;/syscall_hardening __ro_after_init = SYSCALL_HARDENING_OFF;/' arch/x86/kernel/cpu/common.c
                echo "Defaulted syscall_hardening to OFF"
              fi
              ;;
            6.6)
              curl -L "https://github.com/android-generic/kernel_common/commit/fe9a9b4c320577c30e1f22d04039e414c6a3cdec.patch" -o /tmp/ksu-patch1.patch
              git apply --whitespace=fix /tmp/ksu-patch1.patch
              curl -L "https://github.com/android-generic/kernel_common/commit/df772e99e392f24b395ceaf7b26974e3e4828ee9.patch" -o /tmp/ksu-patch2.patch
              git apply --whitespace=fix /tmp/ksu-patch2.patch
              echo "Applied 6.6 patches"
              ;;
            *)
              echo "No syscall hardening patches needed for kernel $KERNEL_VERSION"
              ;;
          esac

          echo "=== Verify X86_FEATURE_INDIRECT_SAFE ==="
          grep 'X86_FEATURE_INDIRECT_SAFE' arch/x86/include/asm/cpufeatures.h || echo "NOT FOUND"

      - name: Integrate KernelSU
        run: |
          cd kernel
          KSU_REF="${{ inputs.ksu_version }}"

          echo "Integrating KernelSU $KSU_REF..."

          # Clone KernelSU
          git clone https://github.com/tiann/KernelSU.git KernelSU

          # 运行 setup.sh
          ./KernelSU/kernel/setup.sh "$KSU_REF"

          # 用实际文件替换 symlink（setup.sh 创建的是 symlink）
          rm -rf common/drivers/kernelsu
          cp -r KernelSU/kernel common/drivers/kernelsu

          # 处理 uapi
          if [ -d "KernelSU/uapi" ] && [ -L "common/drivers/kernelsu/include/uapi" ]; then
            rm -f common/drivers/kernelsu/include/uapi
            cp -r KernelSU/uapi common/drivers/kernelsu/include/uapi
          fi

          # x86_64 编译修复
          if [ -f "common/drivers/kernelsu/syscall_hook_manager.c" ]; then
            if ! grep -qxF '#include <linux/sched/task_stack.h>' common/drivers/kernelsu/syscall_hook_manager.c; then
              sed -i '/#include <linux\/tracepoint.h>/a #include <linux/sched/task_stack.h>' common/drivers/kernelsu/syscall_hook_manager.c
            fi
            if ! grep -qxF '#include <asm/compat.h>' common/drivers/kernelsu/syscall_hook_manager.c; then
              sed -i '/#include <asm\/syscall.h>/a #if defined(__x86_64__)\n#include <asm/compat.h>\n#endif' common/drivers/kernelsu/syscall_hook_manager.c
            fi
          fi

          if [ -f "common/drivers/kernelsu/hook/patch_memory.h" ]; then
            if ! grep -qxF '#include <linux/bug.h>' common/drivers/kernelsu/hook/patch_memory.h; then
              sed -i '/#include <linux\/types.h>/a #include <linux/bug.h>' common/drivers/kernelsu/hook/patch_memory.h
            fi
            sed -i 's|"asm/patching.h"|"asm/text-patching.h"|g' common/drivers/kernelsu/hook/patch_memory.h
          fi

          echo "KernelSU integrated. Checking drivers/kernelsu/..."
          ls common/drivers/kernelsu/

      - name: Build kernel
        run: |
          cd kernel
          echo "Building GKI kernel (this takes 1-3 hours)..."

          DIST_DIR="$PWD/dist"
          mkdir -p "$DIST_DIR"

          # 自动检测 dist 参数格式
          help_output=$(tools/bazel run --config=fast --lto=none //common:kernel_x86_64_dist -- -h 2>&1 || true)
          echo "$help_output" | head -20

          if grep -q -- '--destdir' <<< "$help_output"; then
            DIST_ARG="--destdir"
          elif grep -q -- '--dist_dir' <<< "$help_output"; then
            DIST_ARG="--dist_dir"
          else
            echo "Unable to detect dist argument format"
            exit 1
          fi

          echo "Using $DIST_ARG=$DIST_DIR"

          tools/bazel run \
            --verbose_failures \
            --jobs=$(nproc) \
            --config=fast \
            --lto=none \
            //common:kernel_x86_64_dist \
            -- ${DIST_ARG}="$DIST_DIR"

          echo "Build complete!"
          ls -lh "$DIST_DIR/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64
          path: |
            kernel/dist/bzImage
            kernel/dist/boot.img
            kernel/dist/System.map
          retention-days: 30
          if-no-files-found: warn
