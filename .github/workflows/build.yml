name: Build KernelSU for AVD x86_64

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: '内核分支 (从 BUILD_INFO 的 repo-init-branch 获取)'
        required: true
        default: 'aosp_kernel-common-android16-6.12'
        type: string
      build_number:
        description: 'CI 构建号 (从 uname -r 的 -ab 后面获取)'
        required: true
        default: '15053784'
        type: string
      ksu_version:
        description: 'KernelSU 版本'
        required: true
        default: 'v3.2.5'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libelf-dev libssl-dev \
            liblz4-tool cpio lz4

      - name: Setup Bazelisk
        run: |
          wget -q https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64 \
            -O /tmp/bazel
          sudo mv /tmp/bazel /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Fetch BUILD_INFO
        run: |
          BID=${{ inputs.build_number }}
          TARGET="kernel_virt_x86_64"

          echo "Fetching BUILD_INFO for build $BID ($TARGET)..."

          wget -q "https://ci.android.com/builds/submitted/${BID}/${TARGET}/latest/raw/BUILD_INFO" \
            -O BUILD_INFO.json

          # 提取 repo-init-branch 和 revisions
          cat > extract_info.py << 'PYEOF'
          import json

          with open("BUILD_INFO.json") as f:
              data = json.load(f)

          branch = data["repo-init-branch"]
          print(f"repo-init-branch: {branch}")

          projects = data["parsed_manifest"]["projects"]
          revisions = {}
          for p in projects:
              revisions[p["path"]] = p["revision"]
              print(f"  {p['path']}: {p['revision'][:12]}")

          with open("revisions.json", "w") as f:
              json.dump(revisions, f, indent=2)

          with open("branch.txt", "w") as f:
              f.write(branch)

          print(f"\nFound {len(revisions)} repositories")
          PYEOF

          python3 extract_info.py

      - name: Clone kernel source (repo sync)
        run: |
          BRANCH=$(cat branch.txt)
          echo "Using branch: $BRANCH"

          # 安装 repo 工具
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

          # repo init with kernel manifest
          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "$BRANCH" \
            --repo-rev=stable

          # repo sync
          repo sync -c -j$(nproc --all) --no-tags --fail-fast

          echo "repo sync complete"

      - name: Checkout exact revisions
        run: |
          cat > checkout_revisions.py << 'PYEOF'
          import json, subprocess

          with open("revisions.json") as f:
              revisions = json.load(f)

          for path, rev in revisions.items():
              import os
              if not os.path.isdir(os.path.join(path, ".git")):
                  print(f"  SKIP {path} (not cloned)")
                  continue

              print(f"  Checkout {path} -> {rev[:12]}...")
              subprocess.run(["git", "-C", path, "fetch", "--depth=1", "origin", rev],
                           check=False, capture_output=True)
              result = subprocess.run(["git", "-C", path, "checkout", rev],
                            capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"    OK")
              else:
                  # 尝试 FETCH_HEAD
                  subprocess.run(["git", "-C", path, "checkout", "FETCH_HEAD"],
                               check=False, capture_output=True)
                  print(f"    Used FETCH_HEAD")

          print("\nAll revisions checked out.")
          PYEOF

          python3 checkout_revisions.py

      - name: Apply KernelSU patches
        run: |
          echo "Applying KernelSU ${{ inputs.ksu_version }}..."

          cd common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" \
            | bash -s ${{ inputs.ksu_version }}

          echo "KernelSU applied. Checking drivers/kernelsu/..."
          ls -la drivers/kernelsu/

      - name: Enable KernelSU in defconfig
        run: |
          # KernelSU setup.sh 已自动修改 gki_defconfig
          # 只在 virtual device fragment 中启用 KSU
          VIRT_CONFIG="common-modules/virtual-device/android/virtual_device_x86_64.fragment"

          if [ -f "$VIRT_CONFIG" ] && ! grep -q "CONFIG_KSU" "$VIRT_CONFIG"; then
            echo "" >> "$VIRT_CONFIG"
            echo "# KernelSU" >> "$VIRT_CONFIG"
            echo "CONFIG_KSU=y" >> "$VIRT_CONFIG"
            echo "Added KSU to virtual device fragment"
          else
            echo "KSU already in fragment or file not found"
          fi

      - name: Build kernel
        run: |
          echo "Building virtual device kernel (this takes 1-3 hours)..."

          # 创建符号链接
          mkdir -p tools

          # 找到 bazel.sh
          BAZEL_SH=$(find . -path "*/kleaf/bazel.sh" -type f 2>/dev/null | head -1)
          # WORKSPACE 文件可能在 kleaf/ 或 kleaf/bzlmod/ 中
          WORKSPACE_FILE=$(find . -path "*/kleaf/bazel.WORKSPACE" -type f 2>/dev/null | head -1)
          if [ -z "$WORKSPACE_FILE" ]; then
            WORKSPACE_FILE=$(find . -path "*/kleaf/bzlmod/bazel.WORKSPACE*" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$WORKSPACE_FILE" ]; then
            WORKSPACE_FILE=$(find . -name "*.WORKSPACE*" -path "*/kleaf/*" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$BAZEL_SH" ]; then
            echo "ERROR: Could not find bazel.sh"
            find . -path "*/kleaf/*" -type f 2>/dev/null | head -20
            exit 1
          fi
          if [ -z "$WORKSPACE_FILE" ]; then
            echo "ERROR: Could not find WORKSPACE file"
            find . -path "*/kleaf/*" -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "Found bazel.sh: $BAZEL_SH"
          echo "Found WORKSPACE: $WORKSPACE_FILE"

          ln -sf "../$BAZEL_SH" tools/bazel
          ln -sf "$WORKSPACE_FILE" WORKSPACE

          # 验证
          test -f tools/bazel || { echo "ERROR: tools/bazel still missing"; exit 1; }
          test -f WORKSPACE || { echo "ERROR: WORKSPACE still missing"; exit 1; }
          echo "Symlinks OK"

          tools/bazel run \
            --verbose_failures \
            --jobs=$(nproc) \
            --make_jobs=$(nproc) \
            --config=fast \
            --config=stamp \
            --lto=none \
            //common-modules/virtual-device:virtual_device_x86_64_dist \
            -- --dist_dir=$PWD/dist --flat

          echo "Build complete!"
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-avd-x86_64
          path: |
            dist/boot.img
            dist/bzImage
            dist/initramfs.img
          retention-days: 30
